name: Build and Push to Azure Container Registry

on:
  push:
    branches:
      - main  # هيشتغل أوتوماتيك أول ما ترفعي على برانش main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. سحب الكود من الجيتهاب لـ سيرفر الـ الأتمتة
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. تسجيل الدخول لمستودع Azure باستخدام المفاتيح السرية اللي عملناها
    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # 3. بناء الـ Docker Image وتسميتها
    - name: Build and Tag Docker Image
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/weather-bot:latest .

    # 4. رفع الـ Image أونلاين على Azure
    - name: Push Image to Azure Container Registry
      run: |
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/weather-bot:latest